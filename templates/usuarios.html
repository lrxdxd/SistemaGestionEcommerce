{{define "content"}}

<h2 class="mb-4">
Gestión de Usuarios
</h2>

<div class="mb-3">

    <a href="/usuarios/crear" class="btn btn-primary">

    Registrar Usuario

    </a>

</div>

<table class="table table-striped table-bordered">

    <thead class="table-dark">

        <tr>

            <th>ID</th>

            <th>Nombre</th>

            <th>Email</th>

            <th>Acciones</th>

        </tr>

    </thead>

    <tbody>

{{if .}}

    {{range .}}

    <tr>

        <td>{{.ID}}</td>

        <td>{{.Nombre}}</td>

        <td>{{.Email}}</td>

        <td>

            <button class="btn btn-warning btn-sm">
                Editar
            </button>

            <button class="btn btn-danger btn-sm">
                Eliminar
            </button>

        </td>

    </tr>

    {{end}}

{{else}}

<tr>

    <td colspan="4" class="text-center">

        No existen usuarios registrados.

    </td>

</tr>

{{end}}

</tbody>

</table>

{{end}}
